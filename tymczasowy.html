<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Ulepszanie czipów</title>
<style>
:root {
  --bg: #0f1115;
  --panel: #151922;
  --text: #e6e6e6;
  --accent: #4aa3ff;
  --border: #2a3140;
}
body.light {
  --bg: #ffffff;
  --panel: #f4f4f4;
  --text: #000000;
  --accent: #0066cc;
  --border: #ccc;
}
body { font-family: Arial; background: var(--bg); color: var(--text); padding:20px; }
.section { background: var(--panel); border:1px solid var(--border); padding:10px; margin-bottom:10px; }
button { background: var(--accent); border:none; padding:6px 10px; color:white; cursor:pointer; }
select { background: var(--panel); color: var(--text); border:1px solid var(--border); padding:4px; }
table { width:100%; border-collapse: collapse; }
th, td { border:1px solid var(--border); padding:5px; text-align:center; }
.green{background:green;} .orange{background:orange;} .red{background:red;}
#textDisplay { padding:10px; }
</style>
</head>
<body>

<h2>Ulepszanie czipów</h2>
<button onclick="toggleTheme()">Toggle Light/Dark</button>

<div class="section">
<select id="itemList">
<option value="def">--Wybierz czip--</option>
<option value="jan">Woźny</option>
<option value="sci1">Naukowiec poziomu 1</option>
<option value="sci2">Naukowiec poziomu 2</option>
<option value="sci3">Naukowiec poziomu 3</option>
<option value="spec">Specjalista zabezpieczeń</option>
<option value="guard">Ochroniarz</option>
<option value="chief">Szef ochrony</option>
<option value="mtf">MTF</option>
<option value="com">Dowódca MTF</option>
<option value="hacked3">Zhakowany 3</option>
<option value="hacked4">Zhakowany 4</option>
<option value="hacked5">Zhakowany 5</option>
<option value="director">Dyrektor Placówki</option>
<option value="o5">O5</option>
<option value="goc">Zhakowana GOC</option>
</select>
<button id="showTextButton">Pokaż</button>
</div>

<div class="section">
<table>
<thead>
<tr>
<th>Safe</th><th>Euclid</th><th>Keter</th><th>Biuro</th><th>Ambulatorium</th><th>Ogólny</th>
<th>LCZ-HCZ</th><th>EZ-HCZ</th><th>Głowica</th><th>EC</th><th>Zbrojownia</th>
<th>Brama A</th><th>Brama B</th><th>Femur</th><th>Alfa</th><th>Omega</th><th>Działo</th>
</tr>
</thead>
<tbody>
<tr>
<td id="safe" class="status"></td>
<td id="euclid" class="status"></td>
<td id="keter" class="status"></td>
<td id="office" class="status"></td>
<td id="medbay" class="status"></td>
<td id="general" class="status"></td>
<td id="check_lcz" class="status"></td>
<td id="check_ez" class="status"></td>
<td id="warhead" class="status"></td>
<td id="ec" class="status"></td>
<td id="armory" class="status"></td>
<td id="gatea" class="status"></td>
<td id="gateb" class="status"></td>
<td id="femur" class="status"></td>
<td id="alpha" class="status"></td>
<td id="omega" class="status"></td>
<td id="particle" class="status"></td>
</tr>
</tbody>
</table>
</div>

<div class="section"><div id="textDisplay"></div></div>

<script>
function toggleTheme(){document.body.classList.toggle('light');}

const itemList=document.getElementById("itemList");
const btn=document.getElementById("showTextButton");
const textDisplay=document.getElementById("textDisplay");
const statusCells=document.querySelectorAll('.status');

const itemTexts={
def:`<b>Weź mnie nie wkurwiaj, co?</b>`,
jan:`<b>Woźny</b><br>Fine: Sci2 / Spec<br>Very Fine: Sci2 / Spec`,
sci1:`<b>Sci1</b><br>Fine: Sci2 / Spec<br>Very Fine: Sci2 / Spec`,
sci2:`<b>Sci2</b><br>1:1: Spec / Guard<br>Fine: Sci3<br>Very Fine: Sci3 / Hack3 / Destroy`,
sci3:`<b>Sci3</b><br>1:1: Hack3<br>Fine: Hack4<br>Very Fine: Hack4 / MTF / Destroy`,
spec:`<b>Spec</b><br>1:1: Sci2 / Guard<br>Fine: Hack3<br>Very Fine: Hack3 / MTF / Destroy`,
guard:`<b>Guard</b><br>1:1: Sci2 / Spec<br>Fine: Chief<br>Very Fine: Chief / MTF`,
chief:`<b>Chief</b><br>1:1: MTF<br>Very Fine: MTF / Commander / Destroy`,
mtf:`<b>MTF</b><br>1:1: Chief<br>Fine: Commander<br>Very Fine: Commander / Destroy`,
com:`<b>Commander</b><br>1:1: Director<br>Very Fine: random high tier`,
hacked3:`<b>Hack3</b><br>mixed outcomes`,
hacked4:`<b>Hack4</b><br>mixed outcomes`,
hacked5:`<b>Hack5</b><br>mixed outcomes`,
director:`<b>Director</b><br>Fine: O5<br>Very Fine: O5 / Destroy`,
o5:`<b>O5</b><br>Very Fine: Jan / No change`,
goc:`<b>GOC</b><br>Fine / Very Fine mixed`
};

const itemColors={
jan:{safe:'green',general:'green'},
sci1:{safe:'green',general:'green',office:'green'},
sci2:{safe:'green',euclid:'green',office:'green',general:'green'},
sci3:{safe:'green',euclid:'green',keter:'green',office:'green',general:'green',medbay:'green'}
};

btn.addEventListener("click",()=>{
const val=itemList.value;
statusCells.forEach(c=>c.className='status red');
if(!val){textDisplay.innerText="Wybierz czip";return;}
textDisplay.innerHTML=itemTexts[val]||"Brak danych";
if(itemColors[val]){
Object.entries(itemColors[val]).forEach(([id,color])=>{
let el=document.getElementById(id);
if(el)el.className=`status ${color}`;
});
}
});
</script>

</body>
</html>
